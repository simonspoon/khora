<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Khora QA Fixture</title>
</head>
<body>
  <h1 id="heading">Khora Test Page</h1>

  <!-- text + attribute tests -->
  <p id="greeting" data-testid="hello" data-role="primary">Hello, Khora!</p>

  <!-- type test -->
  <input id="name-input" type="text" placeholder="Enter name" />

  <!-- type test: React-style controlled input value tracking. React shadows
       the native value setter on the instance to detect real changes; a
       plain `el.value = x` assignment updates its tracker too, so onChange
       never fires. Only a set through the *native* prototype setter (typing
       from a real user, or the native-setter trick) is detected. -->
  <input id="react-input" type="text" placeholder="Enter name" />
  <div id="react-input-result">onchange:0</div>

  <!-- click + console test -->
  <button id="counter-btn">Clicked 0</button>

  <!-- wait-for: appends element to DOM after delay -->
  <button id="show-btn">Show Delayed</button>
  <div id="appear-target"></div>

  <!-- wait-gone: removes element from DOM after delay -->
  <button id="hide-btn">Hide Delayed</button>
  <div id="vanish-target"><span id="ephemeral">I will vanish</span></div>

  <!-- network test: triggers a fetch and XHR -->
  <button id="network-btn">Fire Requests</button>

  <!-- drag test: records trusted press-move-release path -->
  <div id="drag-zone" style="width: 300px; height: 120px; border: 1px solid #888;">Drag here</div>
  <div id="drag-result"></div>

  <!-- drag test: setPointerCapture-guarded handler (splitter pattern) -->
  <div id="splitter" style="width: 300px; height: 40px; border: 1px solid #888;">Splitter</div>
  <div id="splitter-result"></div>

  <!-- click-at/dblclick-at test: records trusted point clicks -->
  <div id="point-target" style="width: 120px; height: 60px; border: 1px solid #888;">Point target</div>
  <div id="point-click-result"></div>

  <!-- key test: records trusted key events with modifier state -->
  <div id="key-result"></div>

  <!-- wheel test: native scroll + scroll-chaining (overscroll-behavior:contain).
       scrollTop itself is read directly via `eval` — real scrolling needs no
       JS listener to occur, only a native-trusted wheel event to drive it. -->
  <div id="scroll-outer" style="width: 200px; height: 150px; overflow-y: auto;">
    <div id="scroll-inner" style="width: 100%; height: 60px; overflow-y: auto; overscroll-behavior: contain;">
      <div style="height: 600px;">Inner scroll content</div>
    </div>
    <div style="height: 600px;">Outer scroll content below inner</div>
  </div>
  <div id="wheel-result"></div>

  <!-- find multiple elements -->
  <ul id="items">
    <li class="item">Alpha</li>
    <li class="item">Beta</li>
    <li class="item">Gamma</li>
  </ul>

  <script>
    // Counter: click increments text and logs to console
    var counter = 0;
    document.getElementById('counter-btn').addEventListener('click', function() {
      counter++;
      document.getElementById('counter-btn').textContent = 'Clicked ' + counter;
      console.log('counter:' + counter);
    });

    // Append a new element after 500ms (for wait-for)
    document.getElementById('show-btn').addEventListener('click', function() {
      setTimeout(function() {
        var el = document.createElement('div');
        el.id = 'appeared';
        el.textContent = 'I appeared!';
        document.getElementById('appear-target').appendChild(el);
      }, 500);
    });

    // Remove element from DOM after 500ms (for wait-gone)
    document.getElementById('hide-btn').addEventListener('click', function() {
      setTimeout(function() {
        var el = document.getElementById('ephemeral');
        if (el) el.parentNode.removeChild(el);
      }, 500);
    });

    // Network test: fetch + XHR using blob URLs (works on file://)
    document.getElementById('network-btn').addEventListener('click', function() {
      var blob = new Blob(['ok'], {type: 'text/plain'});
      var url = URL.createObjectURL(blob);
      fetch(url).then(function() { console.log('fetch-done'); });

      var xhr = new XMLHttpRequest();
      xhr.open('POST', url);
      xhr.addEventListener('load', function() { console.log('xhr-done'); });
      xhr.send('test');
    });

    // Drag test: record press point, move count, and trusted release point
    var dragging = false, dragMoves = 0, dragStart = '';
    document.getElementById('drag-zone').addEventListener('mousedown', function(e) {
      dragging = true;
      dragMoves = 0;
      dragStart = Math.round(e.clientX) + ',' + Math.round(e.clientY);
    });
    document.addEventListener('mousemove', function() {
      if (dragging) dragMoves++;
    });
    document.addEventListener('mouseup', function(e) {
      if (!dragging) return;
      dragging = false;
      document.getElementById('drag-result').textContent =
        'drag:' + dragStart + '->' + Math.round(e.clientX) + ',' + Math.round(e.clientY) +
        ' moves:' + dragMoves + ' trusted:' + e.isTrusted;
    });

    // Splitter drag: only moves while the element holds pointer capture,
    // like real splitter/slider widgets. Untrusted synthetic pointer events
    // never satisfy hasPointerCapture, so only trusted input can drive this.
    var splitter = document.getElementById('splitter');
    var capMoves = 0, capStart = '';
    splitter.addEventListener('pointerdown', function(e) {
      splitter.setPointerCapture(e.pointerId);
      capMoves = 0;
      capStart = Math.round(e.clientX) + ',' + Math.round(e.clientY);
    });
    splitter.addEventListener('pointermove', function(e) {
      if (splitter.hasPointerCapture(e.pointerId)) capMoves++;
    });
    splitter.addEventListener('pointerup', function(e) {
      var captured = splitter.hasPointerCapture(e.pointerId);
      splitter.releasePointerCapture(e.pointerId);
      document.getElementById('splitter-result').textContent =
        'capdrag:' + capStart + '->' + Math.round(e.clientX) + ',' + Math.round(e.clientY) +
        ' capmoves:' + capMoves + ' captured:' + captured + ' trusted:' + e.isTrusted;
    });

    // click-at/dblclick-at test: record trusted click/dblclick at a point,
    // including native click-count semantics (dblclick only fires when the
    // second press/release pair carries clickCount 2).
    var pointTarget = document.getElementById('point-target');
    var pointClicks = 0, pointDblclicks = 0;
    pointTarget.addEventListener('click', function(e) {
      pointClicks++;
      document.getElementById('point-click-result').textContent =
        'click:' + pointClicks + ' at:' + Math.round(e.clientX) + ',' + Math.round(e.clientY) +
        ' trusted:' + e.isTrusted;
    });
    pointTarget.addEventListener('dblclick', function(e) {
      pointDblclicks++;
      document.getElementById('point-click-result').textContent =
        'dblclick:' + pointDblclicks + ' at:' + Math.round(e.clientX) + ',' + Math.round(e.clientY) +
        ' trusted:' + e.isTrusted;
    });

    // Key test: record key/code, modifier flags, and trusted state.
    // Listens document-wide, like a real page-level keyboard shortcut.
    document.addEventListener('keydown', function(e) {
      document.getElementById('key-result').textContent =
        'key:' + e.key + ' code:' + e.code +
        ' meta:' + e.metaKey + ' ctrl:' + e.ctrlKey +
        ' shift:' + e.shiftKey + ' alt:' + e.altKey +
        ' trusted:' + e.isTrusted;
    });

    // Wheel test: record trusted state of the native wheel event dispatched
    // at the inner scroll container.
    document.getElementById('scroll-inner').addEventListener('wheel', function(e) {
      document.getElementById('wheel-result').textContent = 'wheel trusted:' + e.isTrusted;
    });

    // React-style value tracking: shadow the native setter on the instance,
    // and only report a change when the underlying native value diverges
    // from what the tracker last saw (i.e. the native setter was used
    // directly, bypassing this instance's shadowed setter).
    (function() {
      var input = document.getElementById('react-input');
      var descriptor = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value');
      var nativeGet = descriptor.get, nativeSet = descriptor.set;
      var trackedValue = nativeGet.call(input);

      Object.defineProperty(input, 'value', {
        get: function() { return nativeGet.call(this); },
        set: function(v) {
          trackedValue = v;
          nativeSet.call(this, v);
        },
        configurable: true
      });

      var onChangeCount = 0;
      input.addEventListener('input', function() {
        var current = nativeGet.call(input);
        if (current !== trackedValue) {
          trackedValue = current;
          onChangeCount++;
          document.getElementById('react-input-result').textContent =
            'onchange:' + onChangeCount + ' value:' + current;
        }
      });
    })();

    // Eval test value
    window.khoraTestValue = 42;
  </script>
</body>
</html>
