<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0d1117"/>

  <!-- Circle outline — dark -->
  <rect x="5" y="2" width="6" height="1" fill="#7c2d12"/>
  <rect x="3" y="3" width="10" height="1" fill="#7c2d12"/>
  <rect x="2" y="4" width="12" height="1" fill="#7c2d12"/>
  <rect x="1" y="5" width="14" height="2" fill="#7c2d12"/>
  <rect x="0" y="7" width="16" height="2" fill="#7c2d12"/>
  <rect x="1" y="9" width="14" height="2" fill="#7c2d12"/>
  <rect x="2" y="11" width="12" height="1" fill="#7c2d12"/>
  <rect x="3" y="12" width="10" height="1" fill="#7c2d12"/>
  <rect x="5" y="13" width="6" height="1" fill="#7c2d12"/>

  <!-- Circle fill — orange -->
  <rect x="4" y="3" width="8" height="1" fill="#f97316"/>
  <rect x="3" y="4" width="10" height="1" fill="#f97316"/>
  <rect x="2" y="5" width="12" height="2" fill="#f97316"/>
  <rect x="1" y="7" width="14" height="2" fill="#f97316"/>
  <rect x="2" y="9" width="12" height="2" fill="#f97316"/>
  <rect x="3" y="11" width="10" height="1" fill="#f97316"/>
  <rect x="4" y="12" width="8" height="1" fill="#f97316"/>

  <!-- Upper-left highlight -->
  <rect x="4" y="3" width="3" height="1" fill="#fb923c"/>
  <rect x="3" y="4" width="4" height="1" fill="#fb923c"/>
  <rect x="2" y="5" width="5" height="1" fill="#fb923c"/>

  <!-- Cross reticle — dark, extends beyond circle -->
  <rect x="7" y="0" width="2" height="16" fill="#7c2d12"/>
  <rect x="0" y="7" width="16" height="2" fill="#7c2d12"/>

  <!-- Tick marks on reticle -->
  <rect x="6" y="1" width="1" height="1" fill="#7c2d12"/>
  <rect x="9" y="1" width="1" height="1" fill="#7c2d12"/>
  <rect x="6" y="14" width="1" height="1" fill="#7c2d12"/>
  <rect x="9" y="14" width="1" height="1" fill="#7c2d12"/>
  <rect x="1" y="6" width="1" height="1" fill="#7c2d12"/>
  <rect x="1" y="9" width="1" height="1" fill="#7c2d12"/>
  <rect x="14" y="6" width="1" height="1" fill="#7c2d12"/>
  <rect x="14" y="9" width="1" height="1" fill="#7c2d12"/>

  <!-- Center ring — scope focus -->
  <rect x="6" y="6" width="4" height="1" fill="#fed7aa"/>
  <rect x="6" y="9" width="4" height="1" fill="#fed7aa"/>
  <rect x="6" y="6" width="1" height="4" fill="#fed7aa"/>
  <rect x="9" y="6" width="1" height="4" fill="#fed7aa"/>

  <!-- Center dot — bright -->
  <rect x="7" y="7" width="2" height="2" fill="#fff7ed"/>
</svg>
